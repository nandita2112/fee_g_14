<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe, Image & Video Example</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            text-align:center;
        }

        section{
            margin:30px;
        }

        iframe, video{
            width:500px;
            height:300px;
            border:2px solid black;
            margin:10px;
        }

        img{
            width:300px;
            height:200px;
            object-fit:cover;
            margin:10px;
            border-radius:10px;
        }
    </style>
</head>
<body>

<h1>lallallalal</h1>

<!-- IMAGE -->
<section>
    <h2>Images</h2>

    <img src="https://picsum.photos/300/200" alt="Random Image">

    <img src="https://placebear.com/300/200" alt="Bear">

     <img src="https://i.pinimg.com/736x/7a/07/e8/7a07e8ff59e2077368e94ccae5c8406c.jpg" alt="bts" width="300" height="300">
</section>


<section>
    <h2>Video</h2>

    <video controls>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>

    <video controls>
        <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" type="video/mp4">
    </video>
</section>


<section>
    <h2>Iframes</h2>

    <iframe
        src="https://www.openstreetmap.org/export/embed.html?bbox=-0.15%2C51.50%2C-0.10%2C51.52&layer=mapnik">
    </iframe>

    <iframe
        src="https://www.wikipedia.org">
    </iframe>

    

</section>

</body>
</html>
